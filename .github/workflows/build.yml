name: Build LoRa Scanner APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find project root
        run: |
          if [ -f "settings.gradle" ]; then
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          elif [ -f "LoRaScanner/settings.gradle" ]; then
            echo "PROJECT_DIR=LoRaScanner" >> $GITHUB_ENV
          else
            find . -name "settings.gradle" | head -1
            echo "PROJECT_DIR=$(find . -name 'settings.gradle' | head -1 | xargs dirname)" >> $GITHUB_ENV
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Generate Gradle Wrapper
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          gradle wrapper --gradle-version 8.6 --distribution-type bin
          chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Build Debug APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: lora-scanner-debug
          path: "**/apk/debug/*.apk"
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: lora-scanner-release
          path: "**/apk/release/*.apk"
          retention-days: 90
